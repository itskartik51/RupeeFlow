name: Fetch Bank Logos

on:
  workflow_dispatch:

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run Script
        run: python download_logos.py
        
      - name: Commit and Push Images
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/res/drawable/*.png
          git commit -m "Auto-downloaded HD Bank Logos" || echo "No changes to commit"
          git push
